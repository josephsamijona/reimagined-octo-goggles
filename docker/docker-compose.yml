# Local development docker-compose
# Usage: docker compose -f docker/docker-compose.yml up --build

services:
  db:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-jhbridge}
      MYSQL_USER: ${MYSQL_USER:-jhbridge}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-jhbridge}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  django:
    build:
      context: ..
      dockerfile: docker/django/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      - MYSQL_URL=mysql://${MYSQL_USER:-jhbridge}:${MYSQL_PASSWORD:-jhbridge}@db:3306/${MYSQL_DATABASE:-jhbridge}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ..:/app
    command: python manage.py runserver 0.0.0.0:8000

  fastapi:
    build:
      context: ..
      dockerfile: docker/fastapi/Dockerfile
    ports:
      - "8001:8001"
    env_file:
      - ../.env
    environment:
      - MYSQL_URL=mysql://${MYSQL_USER:-jhbridge}:${MYSQL_PASSWORD:-jhbridge}@db:3306/${MYSQL_DATABASE:-jhbridge}
      - CELERY_BROKER_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../services:/app

  celery:
    build:
      context: ..
      dockerfile: docker/django/Dockerfile
    env_file:
      - ../.env
    environment:
      - MYSQL_URL=mysql://${MYSQL_USER:-jhbridge}:${MYSQL_PASSWORD:-jhbridge}@db:3306/${MYSQL_DATABASE:-jhbridge}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ..:/app
    command: celery -A config worker -l info

  frontend:
    build:
      context: ..
      dockerfile: docker/frontend/Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - django
    volumes:
      - ../adminfrontend/src:/app/src
      - ../adminfrontend/public:/app/public
    environment:
      - REACT_APP_API_URL=http://localhost:8000

volumes:
  mysql_data:
