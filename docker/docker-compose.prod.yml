# Production docker-compose overrides
# Usage: docker compose -f docker/docker-compose.yml -f docker/docker-compose.prod.yml up -d

services:
  db:
    ports: []
    restart: always

  redis:
    ports: []
    restart: always

  django:
    ports: []
    volumes: []
    restart: always
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4

  fastapi:
    ports: []
    volumes: []
    restart: always

  celery:
    volumes: []
    restart: always

  frontend:
    ports: []
    volumes: []
    restart: always

  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - django
      - fastapi
      - frontend
    restart: always
