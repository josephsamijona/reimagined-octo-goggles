{% extends 'notif/layouts/base.html' %}

{% block content %}
<h2>New User Registration</h2>
<p><strong>Admin Alert</strong></p>

<div class="info-box">
    <p>A new user has just registered on the platform.</p>
    <hr>
    <p><strong>Name:</strong> {{ new_user.get_full_name }}</p>
    <p><strong>Email:</strong> {{ new_user.email }}</p>
    <p><strong>Role:</strong> {{ new_user.role|default:"Unknown" }}</p>
</div>

<a href="{{ admin_url }}" class="button">Review User</a>
{% endblock %}
