<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8f9fa;
            margin: 0;
            padding: 0;
            color: #333;
        }

        .email-container {
            max-width: 600px;
            margin: 20px auto;
            background: #ffffff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            border: 1px solid #e0e0e0;
        }

        .header {
            background-color: #003366;
            padding: 20px;
            text-align: center;
        }

        .header img {
            max-width: 150px;
            height: auto;
        }

        .content {
            padding: 30px;
            line-height: 1.6;
        }

        .footer {
            background-color: #f8f9fa;
            padding: 20px;
            text-align: center;
            font-size: 12px;
            color: #666;
            border-top: 1px solid #e0e0e0;
        }

        .button {
            display: inline-block;
            background-color: #003366;
            color: #ffffff;
            padding: 12px 24px;
            text-decoration: none;
            border-radius: 4px;
            margin-top: 20px;
            font-weight: bold;
        }

        .info-box {
            background-color: #f0f7ff;
            border-left: 4px solid #003366;
            padding: 15px;
            margin: 20px 0;
        }
    </style>
</head>

<body>
    <div class="email-container">
        <div class="header">
            <img src="https://jhbridgetranslation.com/images/logo.png" alt="JH Bridge Translation"
                onerror="this.style.display='none'">
        </div>

        <div class="content">
            {% block content %}
            {% endblock %}
        </div>

        <div class="footer">
            <p><strong>JHBridge Translation services</strong></p>
            <p>Marketplace at Braintree, 500 Grossman Dr, Braintree, MA 02184, USA</p>
            <p>Phone: +1 774-223-8771 | Email: <a
                    href="mailto:contact@jhbridgetranslation.com">contact@jhbridgetranslation.com</a></p>
            <p>&copy; {% now "Y" %} JH Bridge Translation. All rights reserved.</p>
        </div>
    </div>
</body>

</html>
